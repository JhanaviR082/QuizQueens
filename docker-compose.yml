version: '3.9'

services:

  # ── MySQL Database ──────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quizqueens-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: quizqueens
      MYSQL_USER: quizqueens
      MYSQL_PASSWORD: quizqueens_pass
    ports:
      - "3306:3306"
    volumes:
      - quizqueens-db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "quizqueens", "-pquizqueens_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizqueens-net

  # ── Spring Boot Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizqueens-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/quizqueens?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: quizqueens
      SPRING_DATASOURCE_PASSWORD: quizqueens_pass
      APP_JWT_SECRET: QuizQueensSecretKey2024_ChangeThisToSomethingVeryLongAndRandom_AtLeast256Bits!
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    networks:
      - quizqueens-net

  # ── Nginx (serves frontend + proxies API) ───────────────
  nginx:
    image: nginx:alpine
    container_name: quizqueens-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - quizqueens-net

volumes:
  quizqueens-db-data:

networks:
  quizqueens-net:
    driver: bridge