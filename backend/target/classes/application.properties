# ── Server ──
server.port=8080
server.servlet.context-path=/api

# ── MySQL (Docker) ──
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/quizqueens
spring.datasource.username=qq_user
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──
app.jwt.secret=QuizQueensSecretKey2024_ChangeThisToSomethingVeryLongAndRandom_AtLeast256Bits!
app.jwt.expiration-ms=86400000

# ── CORS (allow frontend dev server) ──
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost

# ── Logging ──
logging.level.com.quizqueens=DEBUG
logging.level.org.springframework.security=WARN