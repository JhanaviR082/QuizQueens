<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizQueens</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24'%3E ♛ %3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════
   COMPOSITION NOTEBOOK THEME — QuizQueens
   Black speckled cover · White ruled lines · Chalk glow
═══════════════════════════════════════════════════════ */
:root {
  --bg-primary: #0f0b12;
  --bg-secondary: #18111b;
  --bg-card: #211620;

  --accent-gold: #7a1628;
  --accent-gold-soft: #a7344a;
  --accent-burgundy: #5a0f1c;
  --royal-gold: #d8b35f;

  --text-primary: #f5f5f7;
  --text-secondary: #b4adb8;
  --text-muted: #7e7484;

  --border-subtle: rgba(255,255,255,0.08);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════ SPLASH — NOTEBOOK COVER ═══════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2.5rem;
  transition: opacity 0.9s ease, visibility 0.9s ease;
  background:
    radial-gradient(circle at 25% 20%, rgba(216,179,95,0.14), transparent 36%),
    radial-gradient(circle at 80% 70%, rgba(122,22,40,0.28), transparent 45%),
    linear-gradient(160deg, #2a0f1c 0%, #160b14 55%, #0c0a11 100%);
}
#splash.hide { opacity:0; visibility:hidden; pointer-events:none; }

/* Left spine */
#splash::before {
  content:'';
  position:absolute; top:0; left:0;
  width:54px; height:100%;
  background: linear-gradient(to right, #3c0d1b 60%, #5a0f1c 100%);
  border-right: 2px solid rgba(216,179,95,0.35);
  box-shadow: inset -6px 0 18px rgba(0,0,0,0.75), 4px 0 12px rgba(122,22,40,0.45);
  z-index:1;
}

/* Subtle gloss highlight */
#splash::after {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse 55% 38% at 65% 44%, rgba(216,179,95,0.08) 0%, transparent 70%);
  pointer-events:none; z-index:1;
}

/* ── The label ── */
.splash-label {
  position:relative; z-index:2;
  background: linear-gradient(160deg, #27121d 0%, #1d1119 100%);
  width: min(480px, 85vw);
  padding: 2rem 2.5rem 3rem;
  display:flex; flex-direction:column; align-items:center; gap:0.8rem;
  border-radius: 4px 4px 42% 42% / 4px 4px 26px 26px;
  border: 1px solid rgba(216,179,95,0.35);
  box-shadow:
    0 10px 32px rgba(0,0,0,0.75),
    0 0 28px rgba(122,22,40,0.25),
    inset 0 1px 0 rgba(216,179,95,0.22);
  opacity:0;
  animation: labelIn 0.65s 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes labelIn {
  from { opacity:0; transform:scale(0.88) translateY(14px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.splash-label-eyebrow {
  font-family:'Inter',sans-serif;
  font-size:0.63rem; letter-spacing:0.22em;
  color:rgba(216,179,95,0.78); text-transform:uppercase; text-align:center;
}
.splash-title {
  display:flex; flex-wrap:wrap; justify-content:center;
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,7vw,3.1rem); font-weight:700;
  color:var(--royal-gold); line-height:1;
  position:relative; z-index:1;
  text-shadow: 0 2px 10px rgba(216,179,95,0.35);
}
.splash-title span {
  display:inline-block; opacity:0; transform:translateY(10px);
  animation: letterDrop 0.32s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes letterDrop { to { opacity:1; transform:translateY(0); } }

.splash-crown {
  font-size:1.55rem; position:relative; z-index:1;
  animation: crownSway 3s ease-in-out infinite;
  filter: drop-shadow(0 0 10px rgba(216,179,95,0.45));
}
@keyframes crownSway {
  0%,100%{transform:rotate(-5deg) scale(1);}
  50%{transform:rotate(5deg) scale(1.07);}
}
.splash-sub-label {
  font-family:'Inter',sans-serif;
  font-size:0.62rem; letter-spacing:0.13em;
  color:rgba(245,245,247,0.72); text-transform:uppercase;
  position:relative; z-index:1; text-align:center;
  padding: 0.7rem 1.5rem;
  border-top: 1px solid rgba(216,179,95,0.4);
  border-bottom: 1px solid rgba(216,179,95,0.4);
  width: calc(100% - 2rem);
  margin: 0.8rem 1rem 0;
}

/* Loading bar */
.splash-bar {
  position:relative; z-index:2;
  width:min(190px,48vw); height:3px;
  background:rgba(122,22,40,0.35);
  border-radius:99px; overflow:hidden;
  opacity:0;
  animation: fadeUp 0.4s 2.5s forwards;
}
.splash-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--accent-burgundy), var(--royal-gold));
  border-radius:99px; width:0;
  animation: barFill 1.3s 2.6s ease forwards;
  box-shadow: 0 0 10px rgba(216,179,95,0.5);
}
@keyframes barFill { to { width:100%; } }
@keyframes fadeUp {
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}

/* ═══════════════════ APP — OPEN NOTEBOOK INTERIOR ═══════════════════ */
#app {
  min-height:100vh; display:none; flex-direction:column;
  align-items:center; padding:2rem 1rem 6rem 5rem;
  position:relative;
  background-color: var(--bg-primary);
  background-image: radial-gradient(circle at 20% 10%, rgba(122,22,40,0.14), transparent 32%);
  background-attachment:fixed;
  animation:appFadeIn 0.7s ease forwards;
}
@keyframes appFadeIn{from{opacity:0;}to{opacity:1;}}
#app.visible{display:flex;}

/* White margin line */
#app::before {
  content:''; position:fixed; top:0; left:52px;
  width:1.5px; height:100%;
  background:transparent;
  box-shadow:none;
  z-index:0; pointer-events:none;
}
/* Spine shadow */
#app::after {
  content:''; position:fixed; top:0; left:0;
  width:52px; height:100%;
  background:transparent;
  z-index:0; pointer-events:none;
}

/* Punch holes */
.hole {
  position:fixed; left:16px;
  width:21px; height:21px;
  background:transparent; border-radius:50%;
  border:none;
  box-shadow:none;
  opacity:0;
  z-index:1; pointer-events:none;
}

/* ═══════════════════ HEADER ═══════════════════ */
.site-header {
  width:100%; max-width:900px;
  display:flex; align-items:center; justify-content:space-between;
  padding:1rem 1.5rem; margin-bottom:2rem;
  position:relative; z-index:10;
  border-bottom:1px solid var(--border-subtle);
}
.logo {
  font-family: 'Cinzel', serif;
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--accent-gold);
}
.logo span { color: var(--royal-gold); }
.nav-actions { display:flex; gap:0.75rem; align-items:center; }
#userInfo {
  font-family:'Inter',sans-serif; font-size:0.88rem;
  color:var(--text-secondary); background:rgba(255,255,255,0.02);
  border:1px solid var(--border-subtle);
  padding:0.3rem 0.9rem; border-radius:20px; display:none;
}

/* ═══════════════════ CARDS — BLACK 3D ═══════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 2rem;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.5);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  width:100%; max-width:600px;
  margin:0 auto; overflow:hidden;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 18px 45px rgba(0,0,0,0.6);
}
.card::before {
  content:''; position:absolute; top:0; left:2.8rem;
  width:0; height:0;
  background:transparent;
  box-shadow:none;
}

/* ═══════════════════ PAGES ═══════════════════ */
.page{display:none;flex-direction:column;gap:1.5rem;width:100%;max-width:900px;animation:slideIn 0.35s ease;}
.page.active{display:flex;}
@keyframes slideIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════════════ TYPOGRAPHY ═══════════════════ */
h1,h2,h3 {
  font-family: 'Cinzel', serif;
  color: var(--text-primary);
  letter-spacing: 0.5px;
  line-height:1.2;
}
h1{font-size:2.2rem;}
h2{font-size:1.8rem;}
h3{font-size:1.4rem;color:var(--text-secondary);}
p,label,small {
  font-family: 'Inter', sans-serif;
  color: var(--text-secondary);
  line-height:1.7;
}
small{font-size:0.85rem;opacity:0.55;}

/* ═══════════════════ FORMS ═══════════════════ */
.field-group{display:flex;flex-direction:column;gap:0.4rem;}
.field-group label{
  font-size:0.82rem;color:var(--text-muted);
  font-weight:600;letter-spacing:0.07em;
  text-transform:uppercase;font-family:'Inter',sans-serif;
}
input, textarea, select {
  font-family: 'Inter', sans-serif;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 0.7rem 1rem;
  color: var(--text-primary);
  width:100%;
  outline:none;
  transition: border 0.2s ease, box-shadow 0.2s ease;
  resize:vertical;
}
input:focus,textarea:focus,select:focus{
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 3px rgba(122,22,40,0.22);
}
select option{background:var(--bg-secondary);}
::placeholder{color:var(--text-muted);}

/* ═══════════════════ BUTTONS ═══════════════════ */
.btn{
  font-family: 'Inter', sans-serif;
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  border-radius: 8px;
  padding: 0.6rem 1.6rem;
  transition: all 0.2s ease;
  cursor:pointer;
}
.btn:hover{
  background: rgba(255,255,255,0.04);
}
.btn:active{transform:translateY(1px);}

.btn-primary{
  background: var(--accent-burgundy);
  color: #111;
  border: none;
  font-weight: 600;
}
.btn-primary:hover{
  background: var(--royal-gold);
}
.btn-gold{
  background: var(--accent-burgundy);
  color: white;
  border: none;
}
.btn-gold:hover{
  background: #7a1628;
}
.btn-sm{font-size:0.9rem;padding:0.35rem 1rem;}
.btn-link{
  border:none;background:none;box-shadow:none;
  color:var(--text-secondary);text-decoration:underline;
  padding:0;cursor:pointer;font-family:'Inter',sans-serif;
}
.btn-link:hover{transform:none;box-shadow:none;color:#fff;}
.btn-group{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;}

/* ═══════════════════ TABS ═══════════════════ */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:1.5rem;}
.tab{
  font-family: 'Inter', sans-serif;
  color: var(--text-muted);
  border-bottom:2px solid transparent;
  padding: 0.6rem 1.5rem;
  transition: all 0.2s ease;
  margin-bottom:-1px;
  cursor:pointer;
  background:none; border-top:none; border-left:none; border-right:none;
}
.tab:hover{color:var(--text-secondary);}
.tab.active{
  color: var(--accent-gold);
  border-bottom-color: var(--accent-gold);
  box-shadow: 0 4px 12px rgba(122,22,40,0.32);
}

/* ═══════════════════ QUIZ GRID ═══════════════════ */
.quiz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem;}
.quiz-card{
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:12px;
  padding:1.2rem;
  box-shadow: 0 8px 22px rgba(0,0,0,0.45);
  position:relative; cursor:pointer;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
  overflow:hidden;
}
.quiz-card::before{
  content:''; position:absolute; top:0; left:1.5rem;
  width:0; height:0; background:transparent;
}
.quiz-card:hover{
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(0,0,0,0.6);
  border-color:rgba(122,22,40,0.38);
}
.quiz-card-title{
  font-family:'Cinzel',serif; font-size:1.15rem; color:var(--text-primary);
  margin-bottom:0.3rem;
}
.quiz-card-meta{font-size:0.82rem;color:var(--text-secondary);font-family:'Inter',sans-serif;}
.quiz-badge{
  display:inline-block; font-family:'Inter',sans-serif;
  font-size:0.72rem; padding:0.12rem 0.5rem; border-radius:20px;
  margin-top:0.4rem; border:1px solid rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.04);
}
.badge-mcq,.badge-fill,.badge-mixed{
  border-color:rgba(255,255,255,0.25); color:rgba(255,255,255,0.6);
}

/* ═══════════════════ QUESTION BUILDER ═══════════════════ */
.question-block{
  background:rgba(255,255,255,0.025);
  border:1px dashed rgba(255,255,255,0.13);
  border-radius:3px; padding:1.2rem;
  animation:fadeIn 0.28s ease; margin-bottom:1rem;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;}
.q-num{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text-secondary);font-weight:700;}
.q-remove{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.35);font-size:1.2rem;padding:0.2rem;transition:all 0.15s;}
.q-remove:hover{color:#fff;text-shadow:0 0 8px rgba(255,255,255,0.7);transform:scale(1.2);}
.options-grid{display:grid;gap:0.4rem;margin-top:0.6rem;}
.option-row{display:grid;grid-template-columns:auto 1fr auto;gap:0.5rem;align-items:center;}
.option-label{font-family:'Inter',sans-serif;font-size:0.85rem;color:var(--text-secondary);}
.correct-radio{accent-color:#fff;width:16px;height:16px;cursor:pointer;}

/* ═══════════════════ ATTEMPT ═══════════════════ */
.attempt-question{
  background:rgba(255,255,255,0.02);
  border-left:2px solid rgba(255,255,255,0.18);
  padding:1rem 1.2rem; border-radius:0 3px 3px 0;
  margin-bottom:1.2rem;
  transition:border-color 0.2s, background 0.2s;
}
.attempt-question:hover{
  border-left-color:rgba(255,255,255,0.55);
  background:rgba(255,255,255,0.038);
}
.attempt-q-text{
  font-family:'Cinzel',serif; font-size:1.1rem;
  margin-bottom:0.8rem; color:#fff;
}
.attempt-options{display:flex;flex-direction:column;gap:0.32rem;}
.attempt-option{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.5rem 0.8rem; border-radius:3px;
  cursor:pointer; transition:background 0.15s, border-color 0.15s;
  font-family:'Inter',sans-serif; color:var(--text-secondary);
  border:1px solid transparent;
}
.attempt-option:hover{
  background:rgba(255,255,255,0.055);
  border-color:rgba(255,255,255,0.14); color:#fff;
}
.attempt-option input[type="radio"]{accent-color:#fff;}
.fill-input{
  font-family:'Inter',sans-serif; font-size:1rem;
  border:1px solid var(--border-subtle);
  border-radius:8px;
  background:var(--bg-secondary); padding:0.7rem 1rem; width:100%;
  color:var(--text-primary); outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.fill-input:focus{
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 3px rgba(122,22,40,0.22);
}

/* ═══════════════════ RESULT ═══════════════════ */
.result-banner{
  text-align:center; padding:2rem;
  background:var(--bg-secondary);
  border-radius:12px;
  border:1px solid var(--border-subtle);
  box-shadow:0 12px 30px rgba(0,0,0,0.5);
}
.result-score{
  font-family: 'Cinzel', serif;
  font-size: 4rem;
  color: var(--accent-gold);
  text-shadow:
    0 0 15px rgba(122,22,40,0.65),
    0 0 30px rgba(122,22,40,0.28);
}
.result-emoji{font-size:3rem;filter:drop-shadow(0 0 8px rgba(255,255,255,0.35));}

/* ═══════════════════ SCORES ═══════════════════ */
.score-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.75rem 0; border-bottom:1px solid rgba(255,255,255,0.06);
  font-family:'Inter',sans-serif;
}
.score-row:last-child{border-bottom:none;}
.score-val{
  font-family:'Cinzel',serif; font-size:1.4rem; color:#fff; font-weight:700;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* ═══════════════════ TOAST ═══════════════════ */
#toast{
  position:fixed; bottom:2rem; right:2rem;
  background:#0e0e0e; border:1px solid rgba(255,255,255,0.18);
  color:#fff; font-family:'Inter',sans-serif;
  padding:0.8rem 1.5rem; border-radius:3px;
  box-shadow:4px 4px 0 #000, 0 0 18px rgba(255,255,255,0.06);
  z-index:9000; opacity:0; transform:translateY(12px);
  transition:all 0.3s ease; max-width:300px;
}
#toast.show{opacity:1;transform:translateY(0);}
#toast.success{border-color:rgba(216,179,95,0.5);text-shadow:0 0 8px rgba(216,179,95,0.45);}
#toast.error{
  background: linear-gradient(135deg, #2a0f1c 0%, #1d1119 100%);
  border:1px solid rgba(122,22,40,0.6);
  color:rgba(245,245,247,0.9);
  box-shadow: 0 0 20px rgba(122,22,40,0.3), 4px 4px 0 #000;
}

/* ═══════════════════ PROGRESS ═══════════════════ */
.progress-bar{
  width:100%; height:4px; background:rgba(255,255,255,0.06);
  border-radius:99px; overflow:hidden; margin-bottom:1rem;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg, rgba(255,255,255,0.35), rgba(255,255,255,0.9));
  border-radius:99px; transition:width 0.4s ease;
  box-shadow:0 0 8px rgba(255,255,255,0.5);
}

/* ═══════════════════ UTILS ═══════════════════ */
.text-center{text-align:center;}
.mt-1{margin-top:0.5rem;}.mt-2{margin-top:1rem;}.mt-3{margin-top:1.5rem;}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:1rem 0;}
.tag{
  display:inline-block; background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.45); font-family:'Inter',sans-serif;
  font-size:0.8rem; padding:0.15rem 0.6rem; border-radius:20px;
  border:1px solid rgba(255,255,255,0.1); margin:0.1rem;
}
.empty-state{
  text-align:center; padding:3rem 1rem; opacity:0.3;
  font-family:'Cinzel',serif; font-size:1.2rem; color:#fff;
}
.empty-state .emoji{font-size:3rem;display:block;margin-bottom:0.5rem;}
.spinner{
  display:inline-block; width:20px; height:20px;
  border:2px solid rgba(255,255,255,0.08);
  border-top-color:rgba(255,255,255,0.6);
  border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media(max-width:600px){
  #app{padding-left:3.5rem;}
  #app::before{left:38px;} #app::after{width:38px;}
  .hole{left:9px;width:18px;height:18px;}
  .card{padding:1.5rem 1.2rem;}
  .card::before{left:1.5rem;}
  .quiz-grid{grid-template-columns:1fr;}
  .site-header{flex-direction:column;gap:1rem;text-align:center;}
}

/* ═══════════════════ SCROLLBAR ═══════════════════ */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#080808;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.22);}
</style>
</head>
<body>

<!-- ══ SPLASH — COMPOSITION NOTEBOOK COVER ══ -->
<div id="splash">
  <div class="splash-label">
    <div class="splash-label-eyebrow">Composition Notebook</div>
    <div class="splash-crown">👑</div>
    <div class="splash-title" id="splashTitle"></div>
    <div class="splash-sub-label">WHERE KNOWLEDGE WEARS A CROWN</div>
  </div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<!-- ══ PUNCH HOLES ══ -->
<div class="hole" style="top:68px"></div>
<div class="hole" style="top:178px"></div>
<div class="hole" style="top:288px"></div>
<div class="hole" style="top:398px"></div>

  <!-- ATTEMPT -->

<script>
// ══════════════════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════════════════
const API = 'http://localhost:8080/api';
let token = localStorage.getItem('qq_token') || null;
let currentUser = JSON.parse(localStorage.getItem('qq_user') || 'null');
let currentQuizData = null;
let currentAttemptAnswers = {};

// ══════════════════════════════════════════════════════
//  SPLASH
// ══════════════════════════════════════════════════════
const TITLE = 'QuizQueens';
window.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('splashTitle');
  TITLE.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.textContent = ch;
    span.style.animationDelay = `${0.4 + i * 0.09}s`;
    container.appendChild(span);
  });

  const splashDuration = 400 + TITLE.length * 90 + 3500;
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    const app = document.getElementById('app');
    app.classList.add('visible');
    if (token && currentUser) initAuthenticatedState();
    else showPage('auth');
  }, splashDuration);
});

// ══════════════════════════════════════════════════════
//  KEYBOARD NAVIGATION
// ══════════════════════════════════════════════════════
let focusedQuestionIndex = 0;
document.addEventListener('keydown', (e) => {
  const currentPage = document.querySelector('[id^="page-"]:not([style*="display: none"])');
  const pageName = currentPage?.id || '';

  if (e.key === 'Escape') {
    if (['page-attempt','page-create','page-result'].includes(pageName)) showPage('dashboard');
    return;
  }
  if (e.key === '?') {
    alert(`📚 KEYBOARD SHORTCUTS\n\n🧭 Navigation:\n  • Tab: Next question\n  • Shift+Tab: Prev question\n  • Escape: Back to dashboard\n\n📝 Quiz Attempt:\n  • 1-4: Select MCQ option\n  • Ctrl+Enter: Submit quiz\n\n✨ Create Quiz:\n  • Ctrl+K: Add question\n  • Ctrl+S: Save quiz`);
    return;
  }
  if (pageName === 'page-attempt') {
    const questions = document.querySelectorAll('.attempt-question');
    if (e.key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) focusedQuestionIndex = Math.max(0, focusedQuestionIndex - 1);
      else focusedQuestionIndex = Math.min(questions.length - 1, focusedQuestionIndex + 1);
      questions[focusedQuestionIndex].scrollIntoView({ behavior:'smooth', block:'center' });
      questions.forEach((q, i) => {
        q.style.borderLeftColor = i === focusedQuestionIndex ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.18)';
        q.style.background = i === focusedQuestionIndex ? 'rgba(255,255,255,0.05)' : '';
      });
      return;
    }
    if (/^[1-4]$/.test(e.key)) {
      const radios = questions[focusedQuestionIndex]?.querySelectorAll('input[type="radio"]');
      if (radios?.[parseInt(e.key)-1]) { radios[parseInt(e.key)-1].checked=true; radios[parseInt(e.key)-1].dispatchEvent(new Event('change',{bubbles:true})); }
      return;
    }
    if (e.key === 'Enter' && e.ctrlKey) { submitAttempt(); return; }
  }
  if (pageName === 'page-create') {
    if (e.ctrlKey && e.key === 'k') { e.preventDefault(); addQuestion(); return; }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveQuiz(); return; }
  }
});

// ══════════════════════════════════════════════════════
//  API HELPER
// ══════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.message || data.error || 'Something went wrong');
    return data;
  } catch (e) { throw e; }
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3500);
}

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('#page-auth .tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
}
async function login() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) return toast('Fill in all fields', 'error');
  try {
    const data = await api('POST', '/auth/login', { username, password });
    token = data.token; currentUser = data.user;
    localStorage.setItem('qq_token', token);
    localStorage.setItem('qq_user', JSON.stringify(currentUser));
    toast('Welcome back, Queen! 👑', 'success');
    initAuthenticatedState();
  } catch(e) { toast(e.message, 'error'); }
}
async function register() {
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!username || !email || !password) return toast('Fill in all fields', 'error');
  try {
    await api('POST', '/auth/register', { username, email, password });
    toast('Account created! Please login 🎉', 'success');
    switchAuthTab('login');
  } catch(e) { toast(e.message, 'error'); }
}
function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('qq_token'); localStorage.removeItem('qq_user');
  document.getElementById('userInfo').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('loginNavBtn').style.display = 'inline-block';
  showPage('auth'); toast('Goodbye! 👋');
}
function initAuthenticatedState() {
  document.getElementById('userInfo').textContent = `✍️ ${currentUser.username}`;
  document.getElementById('userInfo').style.display = 'inline-block';
  document.getElementById('logoutBtn').style.display = 'inline-block';
  document.getElementById('loginNavBtn').style.display = 'none';
  document.getElementById('dashGreeting').textContent = `Hello, ${currentUser.username}! 👑`;
  showPage('dashboard'); loadBrowse();
}

// ══════════════════════════════════════════════════════
//  PAGE NAV
// ══════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById(`page-${name}`);
  if (pg) pg.classList.add('active');
}

// ══════════════════════════════════════════════════════
//  DASHBOARD TABS
// ══════════════════════════════════════════════════════
function switchDashTab(tab) {
  ['browse','mine','scores'].forEach(t => { document.getElementById(`tab-${t}`).style.display = t===tab?'block':'none'; });
  document.querySelectorAll('#page-dashboard .tab').forEach((t,i) => { t.classList.toggle('active', ['browse','mine','scores'][i]===tab); });
  if (tab==='browse') loadBrowse();
  else if (tab==='mine') loadMine();
  else loadScores();
}

// ══════════════════════════════════════════════════════
//  QUIZ CARDS
// ══════════════════════════════════════════════════════
function renderQuizCard(q, container, owned=false) {
  const typeMap = { MCQ:'badge-mcq MCQ', FILL:'badge-fill Fill Blank', MIXED:'badge-mixed Mixed' };
  const [cls, lbl] = (typeMap[q.quizType] || 'badge-mcq MCQ').split(' ');
  const card = document.createElement('div');
  card.className = 'quiz-card';
  card.innerHTML = `
    <div class="quiz-card-title">${escHtml(q.title)}</div>
    <div class="quiz-card-meta">${q.questions?q.questions.length:q.questionCount||0} questions · by ${escHtml(q.creatorUsername||q.creator||'Unknown')}</div>
    <span class="quiz-badge ${cls}">⬡ ${lbl}</span>
    ${q.description?`<p style="font-size:0.85rem;margin-top:0.4rem;opacity:0.45">${escHtml(q.description)}</p>`:''}
    <div class="btn-group mt-2">
      <button class="btn btn-sm btn-primary" onclick='startAttempt(${JSON.stringify(q.id)})'>Take Quiz →</button>
      ${owned?`<button class="btn btn-sm" onclick='deleteQuiz(${JSON.stringify(q.id)},this)'>🗑</button>`:''}
    </div>`;
  container.appendChild(card);
}
async function loadBrowse() {
  const grid = document.getElementById('browseGrid');
  grid.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const quizzes = await api('GET', '/quizzes');
    grid.innerHTML = '';
    if (!quizzes.length) { grid.innerHTML='<div class="empty-state"><span class="emoji">📭</span>No quizzes yet. Create one!</div>'; return; }
    quizzes.forEach(q => renderQuizCard(q, grid));
  } catch(e) { grid.innerHTML=`<div class="empty-state">⚠️ ${e.message}</div>`; }
}
async function loadMine() {
  const grid = document.getElementById('mineGrid');
  grid.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const quizzes = await api('GET', '/quizzes/mine');
    grid.innerHTML = '';
    if (!quizzes.length) { grid.innerHTML='<div class="empty-state"><span class="emoji">✏️</span>You haven\'t created any quizzes yet.</div>'; return; }
    quizzes.forEach(q => renderQuizCard(q, grid, true));
  } catch(e) { grid.innerHTML=`<div class="empty-state">⚠️ ${e.message}</div>`; }
}
async function deleteQuiz(id, btn) {
  if (!confirm('Delete this quiz?')) return;
  try { await api('DELETE',`/quizzes/${id}`); toast('Quiz deleted','success'); loadMine(); }
  catch(e) { toast(e.message,'error'); }
}
async function loadScores() {
  const container = document.getElementById('scoresContainer');
  container.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const scores = await api('GET', '/scores/mine');
    if (!scores.length) { container.innerHTML='<div class="empty-state"><span class="emoji">📊</span>No scores yet. Take a quiz!</div>'; return; }
    container.innerHTML = `<h3 style="margin-bottom:1rem;">My Score History 📊</h3>` +
      scores.map(s=>`
        <div class="score-row">
          <div>
            <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:#fff;">${escHtml(s.quizTitle)}</div>
            <small>${new Date(s.attemptedAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</small>
          </div>
          <div class="score-val">${s.score}/${s.total} <span style="font-size:0.85rem;opacity:0.45">(${Math.round(s.score/s.total*100)}%)</span></div>
        </div>`).join('');
  } catch(e) { container.innerHTML=`<div class="empty-state">⚠️ ${e.message}</div>`; }
}

// ══════════════════════════════════════════════════════
//  CREATE QUIZ
// ══════════════════════════════════════════════════════
let questionCount = 0;
const defaultQuizType = () => document.getElementById('quizType').value;
function updateQuizType() {}

function addQuestion(forceType) {
  questionCount++;
  const qType = forceType || (defaultQuizType()==='MIXED'?'MCQ':defaultQuizType());
  const container = document.getElementById('questionsContainer');
  const div = document.createElement('div');
  div.className = 'question-block'; div.id = `q${questionCount}`; div.dataset.qtype = qType;
  div.innerHTML = `
    <div class="q-header">
      <span class="q-num">Q${questionCount}</span>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        ${defaultQuizType()==='MIXED'?`<select class="btn btn-sm" style="padding:0.2rem 0.5rem;font-family:'Inter',sans-serif;font-size:0.8rem;background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-subtle);" onchange="changeQType(${questionCount},this.value)"><option value="MCQ">MCQ</option><option value="FILL">Fill in Blank</option></select>`:''}
        <button class="q-remove" onclick="removeQuestion(${questionCount})" title="Remove">✕</button>
      </div>
    </div>
    <div class="field-group">
      <label>Question text *</label>
      <input type="text" id="q${questionCount}-text" placeholder="${qType==='FILL'?'Write sentence with ___ as blank':'Write your question...'}"/>
    </div>
    <div id="q${questionCount}-options">${renderOptionFields(questionCount, qType)}</div>`;
  container.appendChild(div);
  scrollToEl(div);
}

function renderOptionFields(n, type) {
  if (type === 'FILL') {
    return `<div class="field-group mt-1"><label>Correct Answer</label><input type="text" id="q${n}-answer" placeholder="The exact correct answer..."/></div>`;
  }
  return `<div class="options-grid mt-1">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:0.3rem 0.8rem;align-items:center;font-family:'Inter',sans-serif;font-size:0.8rem;color:rgba(255,255,255,0.28);margin-bottom:0.3rem;"><span>✓</span><span>Option text</span></div>
    ${['A','B','C','D'].map(l=>`
    <div class="option-row">
      <label class="option-label">${l}</label>
      <input type="text" id="q${n}-opt${l}" placeholder="Option ${l}..."/>
      <input type="radio" class="correct-radio" name="q${n}-correct" value="${l}" title="Mark as correct"/>
    </div>`).join('')}
    <small style="margin-top:0.3rem;color:rgba(255,255,255,0.22);">Click ○ to mark correct option</small>
  </div>`;
}

function changeQType(n, type) {
  const block = document.getElementById(`q${n}`);
  block.dataset.qtype = type;
  block.querySelector(`#q${n}-options`).innerHTML = renderOptionFields(n, type);
}
function removeQuestion(n) {
  const el = document.getElementById(`q${n}`);
  if (el) { el.style.opacity='0'; el.style.transform='scale(0.95)'; el.style.transition='all 0.2s'; setTimeout(()=>el.remove(),200); }
}

async function saveQuiz() {
  const title = document.getElementById('quizTitle').value.trim();
  const description = document.getElementById('quizDesc').value.trim();
  const quizType = document.getElementById('quizType').value;
  if (!title) return toast('Quiz needs a title!','error');
  const blocks = document.querySelectorAll('.question-block');
  if (!blocks.length) return toast('Add at least one question!','error');
  const questions = [];
  for (const block of blocks) {
    const n = block.id.replace('q','');
    const qtype = block.dataset.qtype;
    const text = document.getElementById(`q${n}-text`).value.trim();
    if (!text) return toast(`Question text missing for Q${n}`,'error');
    if (qtype==='FILL') {
      const answer = document.getElementById(`q${n}-answer`)?.value.trim();
      if (!answer) return toast(`Answer missing for Q${n}`,'error');
      questions.push({questionText:text,questionType:'FILL',correctAnswer:answer,options:[]});
    } else {
      const opts = ['A','B','C','D'].map(l=>document.getElementById(`q${n}-opt${l}`)?.value.trim()).filter(Boolean);
      const correct = block.querySelector(`input[name="q${n}-correct"]:checked`)?.value;
      if (opts.length<2) return toast(`Q${n} needs at least 2 options`,'error');
      if (!correct) return toast(`Select correct answer for Q${n}`,'error');
      const correctText = document.getElementById(`q${n}-opt${correct}`).value.trim();
      questions.push({questionText:text,questionType:'MCQ',options:opts,correctAnswer:correctText});
    }
  }
  try {
    await api('POST','/quizzes',{title,description,quizType,questions});
    toast('Quiz created! 🎉','success');
    document.getElementById('quizTitle').value='';
    document.getElementById('quizDesc').value='';
    document.getElementById('questionsContainer').innerHTML='';
    questionCount=0;
    showPage('dashboard'); switchDashTab('mine');
  } catch(e) { toast(e.message,'error'); }
}

// ══════════════════════════════════════════════════════
//  ATTEMPT QUIZ
// ══════════════════════════════════════════════════════
async function startAttempt(quizId) {
  if (!token) { toast('Please login first!','error'); showPage('auth'); return; }
  try {
    const quiz = await api('GET',`/quizzes/${quizId}`);
    currentQuizData = quiz; currentAttemptAnswers = {}; focusedQuestionIndex = 0;
    document.getElementById('attemptTitle').textContent = quiz.title;
    document.getElementById('attemptDesc').textContent = quiz.description || '';
    document.getElementById('attemptProgress').style.width = '0%';
    const container = document.getElementById('attemptQuestions');
    container.innerHTML = '';
    quiz.questions.forEach((q,i) => {
      const div = document.createElement('div');
      div.className = 'attempt-question'; div.id = `aq${i}`;
      if (q.questionType==='FILL') {
        div.innerHTML = `<div class="attempt-q-text">${i+1}. ${escHtml(q.questionText)}</div>
          <input type="text" class="fill-input" id="aq${i}-fill" placeholder="Type your answer..." oninput="updateProgress()"/>`;
      } else {
        const opts = q.options.map(opt=>`
          <label class="attempt-option">
            <input type="radio" name="aq${i}" value="${escHtml(opt)}" onchange="updateProgress()"/>
            ${escHtml(opt)}
          </label>`).join('');
        div.innerHTML = `<div class="attempt-q-text">${i+1}. ${escHtml(q.questionText)}</div><div class="attempt-options">${opts}</div>`;
      }
      container.appendChild(div);
    });
    showPage('attempt');
  } catch(e) { toast(e.message,'error'); }
}

function updateProgress() {
  const total = currentQuizData.questions.length; let answered = 0;
  currentQuizData.questions.forEach((q,i) => {
    if (q.questionType==='FILL') { if (document.getElementById(`aq${i}-fill`)?.value.trim()) answered++; }
    else { if (document.querySelector(`input[name="aq${i}"]:checked`)) answered++; }
  });
  document.getElementById('attemptProgress').style.width = `${(answered/total)*100}%`;
}

async function submitAttempt() {
  const answers = []; let unanswered = 0;
  currentQuizData.questions.forEach((q,i) => {
    let ans = '';
    if (q.questionType==='FILL') ans = document.getElementById(`aq${i}-fill`)?.value.trim()||'';
    else ans = document.querySelector(`input[name="aq${i}"]:checked`)?.value||'';
    if (!ans) unanswered++;
    answers.push({questionId:q.id,answer:ans});
  });
  if (unanswered>0 && !confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
  try {
    const result = await api('POST',`/quizzes/${currentQuizData.id}/attempt`,{answers});
    showResult(result);
  } catch(e) { toast(e.message,'error'); }
}

function retakeQuiz() { startAttempt(currentQuizData.id); }

function showResult(result) {
  const pct = Math.round((result.score/result.total)*100);
  document.getElementById('resultScore').textContent = `${result.score} / ${result.total}`;
  document.getElementById('resultPct').textContent = `${pct}%`;
  let emoji='😢', msg='Keep practicing!';
  if (pct>=90){emoji='🏆';msg='Outstanding! You are a true Queen!';}
  else if (pct>=70){emoji='🎉';msg='Great job! Almost perfect!';}
  else if (pct>=50){emoji='📚';msg='Not bad! Keep studying!';}
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
  if (result.breakdown && result.breakdown.length) {
    const html = result.breakdown.map((b,i)=>`
      <div style="padding:0.6rem 0;border-bottom:1px solid rgba(255,255,255,0.06);">
        <div style="font-family:'Cinzel',serif;font-size:1.05rem;color:#fff;">${i+1}. ${escHtml(b.questionText)}</div>
        <div style="font-size:0.9rem;margin-top:0.2rem;">
          Your answer: <span style="color:${b.correct?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)'};text-shadow:${b.correct?'0 0 8px rgba(255,255,255,0.6)':'none'}">${escHtml(b.userAnswer||'(no answer)')} ${b.correct?'✓':'✗'}</span>
          ${!b.correct?`<br>Correct: <span style="color:rgba(255,255,255,0.7);text-shadow:0 0 6px rgba(255,255,255,0.4)">${escHtml(b.correctAnswer)}</span>`:''}
        </div>
      </div>`).join('');
    document.getElementById('resultBreakdown').innerHTML = `<h3 style="margin-bottom:0.5rem;">Review 📝</h3>${html}`;
  }
  showPage('result');
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollToEl(el) { setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),100); }
</script>
