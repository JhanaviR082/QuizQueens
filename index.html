<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Seekers Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= HEADER ================= -->
    <header>
        <div class="container">
            <h1>Job Seekers Portal</h1>
            <p class="tagline">Find Your Dream Opportunity</p>
        </div>
    </header>


    <!-- ================= MAIN CONTENT ================= -->
    <main class="container">

        <!-- Search Section -->
        <section class="search-section">
            <h2>Search Jobs</h2>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Enter job title or keyword">
                <button onclick="searchJobs()">Search</button>
            </div>
        </section>


        <!-- Job Listings Section -->
        <section class="jobs-section">
            <h2>Available Jobs</h2>

            <div id="jobList" class="job-list">
                <!-- Jobs will be dynamically inserted here -->
            </div>
        </section>


        <!-- Add Job Section (if your project has this) -->
        <section class="add-job-section">
            <h2>Post a Job</h2>

            <form id="jobForm">
                <input type="text" id="jobTitle" placeholder="Job Title" required>
                <input type="text" id="companyName" placeholder="Company Name" required>
                <button type="submit">Add Job</button>
            </form>
        </section>

    </main>


    <!-- ================= FOOTER ================= -->
    <footer>
        <div class="container">
            <p>© 2026 Job Seekers Portal | Designed by Team</p>
        </div>
    </footer>


    <!-- External JS -->
    <script src="script.js"></script>

</body>
</html>
